# App
spring.application.name=laundrylink
server.port=8080

logging.level.org.springframework.security=DEBUG
server.error.include-message=always
server.error.include-stacktrace=always

# Supabase PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Supabase requires TLS
spring.datasource.hikari.data-source-properties.sslmode=require

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}

# PayMongo
app.paymongo.base-url=${PAYMONGO_BASE_URL:https://api.paymongo.com/v1}
app.paymongo.secret-key=${PAYMONGO_SECRET_KEY:}
app.paymongo.require-test-key=${PAYMONGO_REQUIRE_TEST_KEY:true}
app.paymongo.webhook-secret=${PAYMONGO_WEBHOOK_SECRET:}
app.paymongo.success-url=${PAYMONGO_SUCCESS_URL:http://localhost:3000/bookings/confirmation?bookingId={bookingId}&payment=success}
app.paymongo.cancel-url=${PAYMONGO_CANCEL_URL:http://localhost:3000/bookings/confirmation?bookingId={bookingId}&payment=cancel}
